<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <rect width="1000" height="700" fill="#F4F7FA"/>

  <!-- faint glow centering the fact table -->
  <ellipse cx="500" cy="355" rx="290" ry="210" fill="#E8833A" opacity="0.05"/>

  <!-- ===== Diagram title (top-center gap) ===== -->
  <text x="500" y="64" font-size="13" font-weight="700" letter-spacing="2.5" fill="#1E6FD0" text-anchor="middle">CUSTOMER 360</text>
  <text x="500" y="92" font-size="24" font-weight="700" fill="#16222E" text-anchor="middle">Star Schema</text>
  <text x="500" y="114" font-size="12.5" fill="#5A6B7B" text-anchor="middle">FACT_SALES surrounded by four conformed dimensions</text>

  <!-- ===== Connectors (drawn under tables) ===== -->
  <g stroke="#8C9CAA" stroke-width="1.7">
    <line x1="395" y1="300" x2="250" y2="250"/>
    <line x1="605" y1="300" x2="750" y2="130"/>
    <line x1="395" y1="415" x2="250" y2="515"/>
    <line x1="605" y1="415" x2="750" y2="515"/>
  </g>
  <g fill="#C16A1F">
    <circle cx="395" cy="300" r="3.5"/>
    <circle cx="605" cy="300" r="3.5"/>
    <circle cx="395" cy="415" r="3.5"/>
    <circle cx="605" cy="415" r="3.5"/>
  </g>
  <g fill="#1E6FD0">
    <circle cx="250" cy="250" r="3.5"/>
    <circle cx="750" cy="130" r="3.5"/>
    <circle cx="250" cy="515" r="3.5"/>
    <circle cx="750" cy="515" r="3.5"/>
  </g>
  <!-- connector labels -->
  <g font-size="10.5" font-family="'SF Mono', 'Consolas', monospace" fill="#44535F" text-anchor="middle">
    <g><rect x="276" y="262" width="92" height="18" rx="9" fill="#FFFFFF" stroke="#D7E0EA"/><text x="322" y="274">customer_key</text></g>
    <g><rect x="632" y="196" width="86" height="18" rx="9" fill="#FFFFFF" stroke="#D7E0EA"/><text x="675" y="208">product_key</text></g>
    <g><rect x="290" y="448" width="64" height="18" rx="9" fill="#FFFFFF" stroke="#D7E0EA"/><text x="322" y="460">date_key</text></g>
    <g><rect x="628" y="448" width="92" height="18" rx="9" fill="#FFFFFF" stroke="#D7E0EA"/><text x="674" y="460">location_key</text></g>
  </g>

  <!-- ============================================================ -->
  <!-- DIM_CUSTOMER (top-left) -->
  <!-- ============================================================ -->
  <g font-family="'SF Mono', 'Consolas', monospace">
    <rect x="40" y="40" width="210" height="286" rx="9" fill="#FFFFFF" stroke="#BBD2EC" stroke-width="1.5"/>
    <text x="56" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#1E6FD0">DIM_CUSTOMER</text>
    <line x1="40" y1="74" x2="250" y2="74" stroke="#1E6FD0" stroke-opacity="0.3"/>
    <g font-size="11.5">
      <text x="54" y="96" font-size="9" font-weight="700" fill="#C16A1F">PK</text><text x="78" y="96" font-weight="700" fill="#16222E">customer_key</text>
      <text x="78" y="114" fill="#44535F">customer_id</text>
      <text x="78" y="132" fill="#44535F">country</text>
      <text x="78" y="150" fill="#44535F">segment</text>
      <text x="78" y="168" fill="#44535F">recency_days</text>
      <text x="78" y="186" fill="#44535F">frequency</text>
      <text x="78" y="204" fill="#44535F">monetary</text>
      <text x="78" y="222" fill="#44535F">clv</text>
      <text x="78" y="240" fill="#44535F">r_score</text>
      <text x="78" y="258" fill="#44535F">f_score</text>
      <text x="78" y="276" fill="#44535F">m_score</text>
      <text x="78" y="294" fill="#44535F">rfm_score</text>
      <text x="78" y="312" fill="#44535F">customer_type</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- DIM_PRODUCT (top-right) -->
  <!-- ============================================================ -->
  <g font-family="'SF Mono', 'Consolas', monospace">
    <rect x="750" y="40" width="210" height="124" rx="9" fill="#FFFFFF" stroke="#BBD2EC" stroke-width="1.5"/>
    <text x="766" y="64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#1E6FD0">DIM_PRODUCT</text>
    <line x1="750" y1="74" x2="960" y2="74" stroke="#1E6FD0" stroke-opacity="0.3"/>
    <g font-size="11.5">
      <text x="764" y="96" font-size="9" font-weight="700" fill="#C16A1F">PK</text><text x="788" y="96" font-weight="700" fill="#16222E">product_key</text>
      <text x="788" y="114" fill="#44535F">product_id</text>
      <text x="788" y="132" fill="#44535F">product_name</text>
      <text x="788" y="150" fill="#44535F">category</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- FACT_SALES (center) -->
  <!-- ============================================================ -->
  <g font-family="'SF Mono', 'Consolas', monospace">
    <rect x="395" y="230" width="210" height="250" rx="9" fill="#FFF7EF" stroke="#E8C39A" stroke-width="2"/>
    <text x="500" y="254" font-family="'Segoe UI', system-ui, sans-serif" font-size="14.5" font-weight="700" fill="#C16A1F" text-anchor="middle">FACT_SALES</text>
    <line x1="395" y1="264" x2="605" y2="264" stroke="#C16A1F" stroke-opacity="0.38"/>
    <g font-size="11.5">
      <text x="423" y="286" fill="#16222E" font-weight="700">invoice_id</text>
      <text x="409" y="304" font-size="9" font-weight="700" fill="#1E6FD0">FK</text><text x="433" y="304" fill="#44535F">customer_key</text>
      <text x="409" y="322" font-size="9" font-weight="700" fill="#1E6FD0">FK</text><text x="433" y="322" fill="#44535F">product_key</text>
      <text x="409" y="340" font-size="9" font-weight="700" fill="#1E6FD0">FK</text><text x="433" y="340" fill="#44535F">date_key</text>
      <text x="409" y="358" font-size="9" font-weight="700" fill="#1E6FD0">FK</text><text x="433" y="358" fill="#44535F">location_key</text>
      <text x="433" y="376" fill="#44535F">quantity</text>
      <text x="433" y="394" fill="#44535F">unit_price</text>
      <text x="433" y="412" fill="#44535F">revenue</text>
      <text x="433" y="430" fill="#44535F">discount</text>
      <text x="433" y="448" fill="#44535F">profit</text>
      <text x="433" y="466" fill="#44535F">order_value</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- DIM_DATE (bottom-left) -->
  <!-- ============================================================ -->
  <g font-family="'SF Mono', 'Consolas', monospace">
    <rect x="40" y="430" width="210" height="232" rx="9" fill="#FFFFFF" stroke="#BBD2EC" stroke-width="1.5"/>
    <text x="56" y="454" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#1E6FD0">DIM_DATE</text>
    <line x1="40" y1="464" x2="250" y2="464" stroke="#1E6FD0" stroke-opacity="0.3"/>
    <g font-size="11.5">
      <text x="54" y="486" font-size="9" font-weight="700" fill="#C16A1F">PK</text><text x="78" y="486" font-weight="700" fill="#16222E">date_key</text>
      <text x="78" y="504" fill="#44535F">full_date</text>
      <text x="78" y="522" fill="#44535F">day</text>
      <text x="78" y="540" fill="#44535F">day_of_week</text>
      <text x="78" y="558" fill="#44535F">week</text>
      <text x="78" y="576" fill="#44535F">month</text>
      <text x="78" y="594" fill="#44535F">quarter</text>
      <text x="78" y="612" fill="#44535F">year</text>
      <text x="78" y="630" fill="#44535F">is_weekend</text>
      <text x="78" y="648" fill="#44535F">month_name</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- DIM_LOCATION (bottom-right) -->
  <!-- ============================================================ -->
  <g font-family="'SF Mono', 'Consolas', monospace">
    <rect x="750" y="470" width="210" height="106" rx="9" fill="#FFFFFF" stroke="#BBD2EC" stroke-width="1.5"/>
    <text x="766" y="494" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#1E6FD0">DIM_LOCATION</text>
    <line x1="750" y1="504" x2="960" y2="504" stroke="#1E6FD0" stroke-opacity="0.3"/>
    <g font-size="11.5">
      <text x="764" y="526" font-size="9" font-weight="700" fill="#C16A1F">PK</text><text x="788" y="526" font-weight="700" fill="#16222E">location_key</text>
      <text x="788" y="544" fill="#44535F">country</text>
      <text x="788" y="562" fill="#44535F">region</text>
    </g>
  </g>

  <!-- ===== Legend (bottom-center gap) ===== -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="11.5" fill="#44535F">
    <rect x="355" y="600" width="13" height="13" rx="3" fill="#FFF7EF" stroke="#E8C39A" stroke-width="1.5"/>
    <text x="375" y="611">Fact table</text>
    <rect x="455" y="600" width="13" height="13" rx="3" fill="#FFFFFF" stroke="#BBD2EC" stroke-width="1.5"/>
    <text x="475" y="611">Dimension</text>
    <text x="560" y="611" font-family="'SF Mono', monospace" font-size="9" font-weight="700" fill="#C16A1F">PK</text>
    <text x="580" y="611">Primary key</text>
    <text x="665" y="611" font-family="'SF Mono', monospace" font-size="9" font-weight="700" fill="#1E6FD0">FK</text>
    <text x="685" y="611">Foreign key</text>
  </g>
</svg>
